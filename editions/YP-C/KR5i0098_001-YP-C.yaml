front:
  text: 初眞戒律序夫虛皇大道秘密靈文高聖太眞清都玉律萬聖寶重萬靈佩奉非金骨玉名者不得輕遇亦不得輕受也戒者禁止之辭益善止惡皈眞捨妄之謂也昔虛皇道君愍念大地眾生逐利馳名貪著聲色不知禍福因緣自貽多生罪咎大啟慈悲救度沈溺故傳演戒律經教開化法界人天爲植福修因之慧炬登眞入道之慈航也代代相承師師相授道藏列欵有載矣後因秦火大變道經戒律十損八九科條門列止存一二故此近代以來戒法日廢至於今日間有得傳者萬萬一二矣雖然萬代不磨之玄律亦未嘗終於湮沒也今感集眾善茂闡玄元之化益宏清靜之宗可知時至之妙在斯一舉將來之望在於今日也遂吿余從事余因崇禎初𡻕雲蹤於楚謁九宫山復陽趙眞人親授戒法得其領要故不避僣妄之罪按法於丙申𡻕三月望日就白雲觀設立戒壇傳戒演鉢上祝當今聖主帝道遐昌下祈宰官士庶身家胥慶接續先宗啟至聖度世之本願提携後進開道流無妄之眞風入戒者果能磨勵身心覷身世若浮雲之變精勤戒行以戒律爲急務之修了生死之大事盡性命之眞常雖有饑寒風暑切身之苦不易其操雖有死生困辱臨難之變不奪其志實際眞宗加功著力業累自是氷消功勲自是日就一身戒行自然融通於變化之中半句律言亦可出沒於陰陽之内天堂地獄渾然成戒子之家風日月星辰都是我心中之活計駕景凌虛不爲尙也倘若教衍天長宗傳地久首則默佐於王綱次則歸功於眾善也時順治十三年𡻕次丙申西晉上黨傳戒道士崑陽子王常月撰初眞戒律序夫律之名何昉乎上古垂拱無爲結繩而治後世人心日漓奸宄叢出聖人設爲律以防之律者正也所以正不正也卽如作樂有律以節氣候之不齊出師有律以禁步武之不整是也道家亦以律名其義何居昔太上老子宣五千言之秘首以道德二字名篇道者天性也德者人心也教人盡人以達天存心以全性雖未設立有律之名若觀妙觀竅卽所以律心柔弱謙下卽所以律身奈沿及於叔世奉道之流有厭魚兔之筌蹄而置於空虛者有竊優孟之衣冠而失其眞似者恣意放蕩禮義也而桎梏視之酣淫也而游戲假之當世詆毁爲異端唾駡爲罪人安有九天仙眞不惡而誚之反推而舉之哉大抵道之不成由德之不立德之不立由身之不檢此道律之所宜急講也崑陽王老師得戒法於復陽趙眞人當世祖章皇帝時於京都白雲觀設立戒壇傳戒演鉢一時授受弟子千有餘人嗣而移舄廣演於江浙間聲教四溢昔余識師於江南之隱仙菴私心已尸祝之矣因狂心未歇難遽投拜今朝謁武當幸遇師傳戒於玉虛宫中遂發心皈命而受持戒律然伏讀之不知言行有規也動靜有體也一切存心制慮尺寸不馳也神骨悚然如遊於五刑三千之林跼蹐而不敢一便余向司李閩鳳刑讞之際覩小民大過小愆動有條例嘗嘆而有言曰願世人善讀國書身不近獄門而作良士今又願道流善讀玄典心不涉鬼路而躋天仙矣律之設義大矣哉時康熙十三年𡻕次癸丑恆山持戒弟子龍起潛稽首拜題戒壇規範引言冷然子曰吾師度人心切演天人之大戒科程法嚴立條目之𢎞規繩網匝密欲擒奔馳狡兔欄宇堅實恐放猙獰白牛不經千鎚百鍊難得一貫十串方寸鉢内誰知馴卧千丈之蛟龍三尺杖頭當見挑携萬頃之明月餐霞御景之仙俱是氣呑木食之子峩冠博帶之徒可擬玉珮金璫之尊誠哉降龍伏虎手段搏日挽月機關從事其門須善摩厲莫厭繁苛九天之上先自五地行持十方之化惟除三尸盤結肯從萬丈澗底走方能崑崙頂上行奉道良友各宜著眼痛自加鞭
