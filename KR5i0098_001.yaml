body:
  text: 持戒弟子龍起潛稽首拜題初真戒説余觀戒律者於三教典籍旨本一也喚是道教恰是儒規喚為道法即是王法人能受持者非僅欲人盡心盡性抑且欲人知命知天出世於入世之中達身於省身之內實有佐於王化繩人於衆善也法中之戒即正心誠意之學戒中之法即治國齊家之化不過欲人循文歸正借此知玄希聖希賢為仙為佛無不從此戒法而出故正心誠意離此戒而何造治國齊家舍此法而何化誠為三教梯航萬不可闕然仙佛之教幽而靈儒之教張而固皆益於人而行於世者實天道也明有王法幽有道法道律治己王律治人二者表裏以扶世教今若祇知有王綱之律不知道法之戒祇知道法之戒不知王綱之律者是謂偏見也殊不知仙佛之戒與王綱之律治己治人其理一也三教聖人無不諄諄言之者蓋謂非此不足以明達至道也夫至道者有天道也人道也所以誠者天道也思誠者人道也誠者無為也自然而然非有為使然故謂天道非假人力也所以無思無為無安排作用存想布置順天道而逆人道故曰順天者存思誠者有為也使然而然非無為自然故謂人假之道非真天然也所以有思有為有安排作用存想布置逆天道而順人道故曰逆天者亡所謂初者始也真者不假也戒者禁止也謂世人始初無假之真性本自天命無思無為自然而然無善可修無惡可作故曰為善無近名為惡無近刑緣督以為經可以保身可以全生可以養親可以盡年萬法從自性中生一念思量名為變化思量作惡化為地獄惡鬼思量修善化為天堂善神邪淫化為犬豕躁暴化為兕虎嫉妬化為蛇蝎仁慈化為聖賢君子小人總在一念思量自性變化故曰千百億化身迷人未識道時未聞經時未遇師時疑團未剖智鏡未開不能省覺自蔽光明任心肆意念念不停思為不返盡被貪瞋癡淫殺盜惡口綺語兩舌妄言十惡並塵境外緣擾亂身心致使六根妄動甘受驅馳勞苦流浪生死無休今自有省皈道皈經皈師三皈戒後洗心懴悔懴者懴其前愆從前所有十惡等業愚迷執著憍誑嫉妬等罪悉皆盡懴禁止永不復起悔者悔其後過從今以後所有十惡等業愚迷執著憍誑嫉妬等罪今已覺悟悉皆永斷更不復作無思無為一念不生復返始初無極自然之真性以還天命之本來故曰初真十戒是也故學真之初必須齋戒禁止十惡變化氣質為主若不先以齋戒禁止十惡變化氣質則學人無所依據與俗何異不然多劫以來舊染習氣何以得除古人云學道頓悟易入多生習氣難忘所以齋戒者為降伏身心之法耳身不受戒習氣必不能移習氣若不能移大體必不能養大體不養則元氣不復元氣不復命必不能立矣心不持齋種性必不能改種性若不能改則本心不定本心不定則元神不歸元神不歸真性必不能見矣故大道無不以見性為體養命為用殊不知性即是道命即是戒道者無為自然也戒者有為使然也故至道之妙從使然以至自然即使從有為以至無為也所以凡務性命雙修者非持齋受戒必不可也齋者齊也本來無齋可齋齊其不齊也戒者止也本來無戒可戒止其不止也因衆生妄生貪嗔癡愛之心淫殺盜妄之情聖人故有持齋受戒之懲若無貪嗔癡愛之心淫殺盜妄之情則齋戒之法何由而設矣古仙云衆人師賢人賢人師聖人聖人師萬物夫萬物者稟天命本來無為自然之善性非假人力思為有安排作用之謂也今去聖日遠以何為師而後可必師聖所傳訓誡以為入聖之基故師戒即所以師聖人也師聖人即所以師萬物也師萬物即所以師天命也師天命即所以師太上無為自然之善性也今初學仙之士未遇明師點化故天命未省性理未明盡被方士所惑執著無明種心不悟持齋受戒即是築基煉己之理煆鍊身心即是下學上達之功專信神奇卓異靜坐默運存想作用功夫殊不知坐靜默運存想作用神奇卓異等術盡屬扭揑安排人力之事總非天命初真無為自然之善性夫天命本來初真無為自然之善性人人本有無修無證自然而然不假人力安排紫陽翁曰終日行未嘗行終日坐未嘗坐殊不知至道之妙其功不在行住坐卧只要生平所學所愛一切事務般般放下一念不生即是天命本來初真之性祖師云本來真性號金丹四假為爐鍊作團此也學人欲見此性非有戒愼恐懼而作梯航必不得見之也故用齋戒者無非借事攝心以盡本性緣情制性以了凡心所以務道之士若不求戒為師持戒為命即是不明性理不順天命不遵聖教之人也不明性理不順天命不遵聖教者即是不畏天命不畏大人不畏聖人之言也不畏天命不畏大人不畏聖人之言者誠為索隱行怪異端之學非惟道法不載亦且王律難容恐犯天地造物之忌不敢同日而語也時康熙丙寅蒲月上浣之吉楚郢吳太一震陽氏書於金陵淸涼山祖庭隱仙庵
