front:
  text: 初真戒律重刋道藏輯要
  hash: sha256:6bafcb9f10db1e547b5af9468c79a8b30c27a64c8ab19df1971fad14081f3cf0
  markers:
  - {type: page-break, offset: 4, content: '', id: CK-KZ_KR5i0098_02p034a}
body:
  text: 初真戒律崑陽子王常月著凡初入太上正宗法門不問道俗必先遵依太上金科玉律三洞戒文供養大道尊像表通都天糾察王天君請祈盟證受三皈依戒第一皈身太上無極大道永脫輪回故曰道寶第二皈神三十六部尊經得聞正法故曰經寶第三皈命玄中大法師不落邪見故曰師寶天尊曰三皈依戒者天地之樞紐神仙之根基發行之初門建心之元兆運氣含靈冥真入理包羅有象朕形無外持之者天地神明慶快心智耳目開張萬物敬畏六腑和樂衆真衛護羣生父母長世不遺人身交泰三皈依竟乃受太上老君所命積功歸根五戒一者不得殺生二者不得葷酒三者不得口是心非四者不得偷盜五者不得邪淫凡能持此五戒精進無虞者益算延齡天神護佑永脫五刑之苦世世不失人身既受太上老君所命積功歸根五戒每日早晨焚香誦太上三元三品三官大帝護國佑民延生保命真經接念太上感應篇逐日演誦校正自己身心有無所犯每誦經篇一句則反思曰我能受得否我能不行否如此勇往精進言行不苟三皈不犯五戒無虞煆煉百日惡念盡消器皿已淨方許受虛皇天尊所命初真十戒第一戒者不得不忠不孝不仁不信當盡節君親推誠萬物第二戒者不得陰賊潛謀害物利己當行陰德廣濟羣生第三戒者不得殺害含生以充滋味當行慈惠以及昆蟲第四戒者不得淫邪敗真穢慢靈氣當守真操使無缺犯第五戒者不得敗人成功離人骨肉當以道助物令九族雍和第六戒者不得讒毁賢良露才揚己當稱人之美善不自伐其功能第七戒者不得飮酒食肉犯律違禁當調和氣性專務淸虛第八戒者不得貪求無厭積財不散當行節儉惠恤貧窮第九戒者不得交遊非賢居處雜穢當慕勝己棲集淸虛第十戒者不得輕忽言笑舉動非真當持重寡辭以道德為務既受初真十戒以證真人之果更猛勇精進持守言行毫無過犯方許再受太上老君所命中極三百大戒若只口誦心違言淸行濁或始勤終怠半途而廢名曰故知故犯其罪尤重愈不可悔永墮沉淪女靑天律無情即太上復出亦不能救汝學道仙子思之愼之行持總説出家在家入戒四衆人等領受戒法後各當定志凝神起大堅固如崑崙山一般不能搖動如金剛石一樣不能磨滅專致一心勿生雜念夜半行持神明來合我身過中不昧鬼氣不能入竅行一善心定神安行十善精神健爽二十善不生疾病三十善所求如願四十善門戶興隆五十善子孫昌盛六十善化難成祥七十善神明擁護八十善地利人和九十善人中殊勝一百善三氣合身二百善德澤揚溢於天下三百善轉輪得大富身四百善轉輪得大貴身五六百善轉輪得大福夀身七百善轉輪得大忠身八百善轉輪得大孝身九百善轉輪得大慧身一千善轉輪得聖王神仙之報身倘若恣情縱欲有一惡魅夢不安有十惡人皆憎棄二十惡身多疾病三十惡所求不諧四十惡轗軻衰耗五十惡家口離散六十惡非禍橫生七十惡鬼魔來侵八十惡有水火災害九十惡來生短命一百惡天曹執戮果能運平等之心行精密妙行一戒不違一律不犯不肯為惡而生寧可守善而死此等戒子是名大道淸信弟子萬魔拱衛諸天保度四天帝王領司邏十部皆駕飛雲緑軿浮空而下觀察戒子妙行雖功行未圓亦必逆注種名於靈圖仙籍也有等不畏天條不勤戒律者粧撰規模不修真際即有女靑考律量罪輕重減其祿算有餘未盡者殃及後世劫劫相仍不能解脫也入戒要規一受天仙戒者稱妙道師中極戒者稱妙德師初真戒者稱妙行師同戒晚輩者稱同衣上座稱先覺師入臘領受天仙戒者持道德經一百日每於寅刻信禮十方共十拜子午二時靜坐內觀不關人事致三業淸淨中極戒者每日巳刻先禮足律師然後起拜朝天懴併靈寶大懴共一百日懴畢止靜初真戒者每日巳刻先禮足律師然後起拜宥罪法懴一百日懴畢止靜已上領戒入臘如違者女靑以逆律致罪又百日禁足不得出外應供不得出外誦經過百日不忌又與事物交接忍辱仁柔不得辨論是非舉止動靜小心精密每逢戊日與同戒者或先覺師進修德業或講論道德南華文始談子黃庭等經並諸家道典熟讀一卷主吏計功十倍講明一卷主吏計功百倍凡入戒者以端重自持行上妙威儀行上妙觀相戒神自來擁護四衆自然起敬也故端形不招屈影而直影自見和聲不須追響而順響自至一繩床子午二時展規於床上盤膝靜坐手不指點足不伸縮口不多言目不神露頭不低身不屈俗家床炕不得坐卧有人禮拜三不起身一打坐不起二看經不起三受齋不起當定觀持咒受之待出規下單還禮卧時當扣齒念咒次神棲幽谷絶慮忘言不得放肆出規衣之外有時出外經行徐徐緩步不可左右顧盼手足張忙如違一次主吏坐謫一過一洞衣淨衣信衣五嶽靈圖冠並淨巾羽裙規芒鞋等具皆有地祇等神併靑衣童子瞻護不得借用別人不得置於不淨之地不得當賣不得與常衣混同雜亂如舊壞者於九月九日向西北焚之其灰送入東流水隨波而去即得戒子延年益夀身無魔障如違者災禍橫生玄都主吏坐謫十過一鉢體如八卦之形惟口蓋用圓當置鉢囊受食之時咒畢積氣存神口不圖張食不有聲匙當正用受食之後洗鉢人囊如違一次坐謫一過一策杖當取靈山向陽竹七節為之上下直通甘竹乃佳印以元始之章動息坐卧恆以自隨有五帝直符吏輔翼如有災變用杖指之指持四溟咒一戒尺以桃木為之四面書符篆除不祥用之又後學有過犯至重者當毁燒衣鉢致罪出教倘若求免以戒尺量罪責罰一淨水瓶注淨水於內不可缺乏以囊盛之遠必當佩之於身盥手方便故也一牒囊置戒衣底巾內裝戒律一薰籠將著三衣先以降真白檀入薰爐薰之一刷牙以棕為之又梳箆枕𥱊被單等物俱要潔淨勿令俗人坐卧用之以上列欵皆出道藏定額後學若不遵於古制私用巧智改易者即教中罪人也逆律之考不能免矣三師原説一傳戒本師乃太上繼宗演教接化大德之師不受天仙戒者不得傳戒每於正月十五七月十五十月十五日會集四衆開壇傳戒戒後行持演鉢一百日一證明大師指授經懴教典威儀規範調御戒子身心制遣七情六欲非受中極戒者不得師之一監戒大師監察入戒者不許犯戒違律如有不法者量律輕重以戒尺責罰懴悔非受中極戒者亦不得師之三衣格領受初真十戒三戒五戒八戒九真妙戒者身著初真信衣計二百四十條三台十褶雲帶二拽淨巾芒鞋行千二百善持淸靜經大通經洞古經得真人戒果行持具足當受中極淨戒或持身戒或智慧戒或觀身戒或妙林戒俱著輕塵淨衣或用淺藍單布為之或用純帛為之亦三台雲帶淨巾芒鞋行二千四百善持玉帝大法得地仙戒果行持具足當受天仙大德妙戒行一百八十細行密戒或三百大戒行三千六百善參道德真經身著天仙霞衣領用直開袖不合縫霞帶雲邊戴五嶽真形冠著五雲輕履行持具足得天仙戒果犯律懴解格入戒者一犯戒律當於庚申日恭對道前禮念宥罪法懴供淨水一盂念𨚑祖懴悔文入靜一月二犯同前三犯者當於甲子日恭對道前禮念朝天法懴併靈寶大懴供淨水三盂入靜三月至於五犯十犯陽消陰熾鬼突神憎不得懴也持受諸咒品睡醒時咒當願衆生以迷入覺一旦豁然聞鐘聲咒太音希聲能悟證真下單時咒化惡反善上書三光使我長生乘景駕雲櫛髮咒泥丸之上玄華寶精左為隱日右為月根六合精鍊百神受恩洗手面咒除垢神廷凝真不散潄口咒太陽和氣開春發柳折取一枝能淨身口學道修真願度三有簪冠咒當願衆生頭容常正首出萬類著衣咒檢束威儀服膺善法穿襪履咒當願衆生踐履真實行不離道上香時咒常焚心香得大淸淨上燈燭咒破除重暗洞照十方朝謁三寶咒太霐雨澄雨明護我形神受人禮拜咒至道沖和永出塵緣飮水咒神水入腹五臟淸明空鉢受食咒太虛無盡真一生神出生咒一粒嘉穀一滴淸泉不忍自食施與幽𩲉享我供者皆賴道恩惟道惟靈覺性常存食齋咒五星之氣六甲之精三真天倉淸雲常盈黃父赤子守中無傾結齋咒百穀入胃與神合氣填補血液尸邪亡墜長生天地飛登玉闕役使六丁靈童奉衛洗鉢咒滌除外味正氣長存收鉢咒混元一氣踵息淵源受襯咒七寶光林來映丹臺受人衣物咒萬物之精護道氣真出堂咒四方無礙入衆妙門托鉢咒唵敕身中三部八景三十九神一萬六千護身之神唵㖿葉㖿朗三波襪嚩𠯐囉嘝執淨瓶咒太玄含一萬物無爭甲灰咒洗灰除垢用灰為首穢去真來淨心淨口成道度人天長地久沐浴咒天地開朗四大為常玄水解穢辟除不祥雙童守護七靈安房雲津練濯萬氣混康內外利貞保茲黃裳臨卧時咒大真玉女侍真衛𩲉三宫金童來守生門夢寐咒吉夢成珠玉惡夢著草木看病咒慧照萬靈真性無為曰忌早不言夢寐午不言殺伐晚不言鬼神三衣式圖天仙洞衣輕塵淨衣初真信衣三台十褶共二百四十條淨巾式鉢式八卦形淨瓶杖玄門持戒威儀凡學人未習戒本不得習經法入戒壇習初真戒未熟不得躐等受中極戒閲戒本須焚香禮拜不得草率展閲不得容人盜看戒本不得盜聽真師説法禮誦功課宜敬謹三時勿簡已入鉢堂修煉身心者及行持中極戒厯三年者方受天仙戒不得矯飾威儀求人恭敬不得廣談因果希人布施不得非時禮拜欲禮拜當在人靜時不得占殿中央禮拜中央是常住位主殿上香燈供具宜細行不得粗率焚香時微咒曰常焚心香得大淸淨上燈燭微咒曰破除重暗洞照十方不得專揀應赴經典習學或遇貧難不堪當安命自慰不得怨天恨地不得見士俗便説當布施作福不得對外教談道法不得強化施主財物亦不得囑托豪貴親知募化不得貨殖營利不得假托緣事募財為私用出入威儀不得無故入他宫觀及僧院不得無故至俗家或有事至俗家事畢即返不得久留不得與親俗小兒等笑談雜語不得以衣物寄頓俗家遠近出入不得失儀同事或失儀不得非笑事師威儀朔望見師當禮拜問師道法當禮拜除飮食時坐功時經行時欲禮拜師止之當順師命師禮拜不得與師同禮拜師前不得受人禮拜侍師講論道法師身心倦教去應去凡出入當先白師製衣服冠巾等物當先白師作衆事如雲遊守山聽講興緣事等當先白師人從己借物當先白師師許然後與欲從人借物當先白師師聽然後去欲習經懴當先白師若人以物施當先白師已然後受己物欲施人當先白師師聽然後與凡事白師師聽與否皆當作禮而退不得含愠師有疾宜盡心看視不得懈怠師令浣褻衣不得現裏師令滌溺器不得嫌不淨師唾涕當即除去燈月下不得履踐師影師教戒嚴切不得還逆語人問師諱答云上某下某問號答云某師視聽威儀閲經典當端坐體認不得輒指日月虹霓不得久視日月雲漢不得視外教書不得視小説傳奇間雜書侍坐師側及對賓客宜正視不得上視不得下視不得流視不得注視亂色嘆羡奇艷隨師登高眺遠視師所視處不得他視隨師出入不得左右顧盼當低頭隨後入城市遇一切戲幻聚衆事不得注目視歸不得侈談城市風景奢華傳達師友書信不得私拆窺視入師友房不得亂將經籍翻視入城市不得顧視女人不得睨視女人不得盜聽説法不得傾聽不得聽淫樂不得聽笑談雜話不得聽唱歌曲不得隔垣傾聽人語師誦經講道當起敬諦聽不得雜聽言語威儀入法堂及侍師席不得高聲言語亦不得大聲咳嗽不得多言不得疾言不得效市語隱謎師不問不得言師語未了不得言不得言人過失不得言士俗家務不得言朝廷官府事不得言閨閫事不得言為媒為保事不得非時言道法不得與婦人低聲密語不得與少年子弟笑談戲語飮食時不得言語寢息時不得言語有親友來訪不得在法堂久坐交談當在林下水邊方可傾心坐論質疑詢道當禮拜致敬師有問當禮拜敬對不得強不知以為知執己見以為是如問家常事不必禮拜當據實對對士俗不得言爐火黃白術不得言彼家術不得言符咒幻術不得訶風罵雨不得言一切傍門小術不得言外教優劣盥櫛威儀頮潄吐水當徐徐引下不得高聲嘔吐唾涕夏月盥器當覆不令生蟲棄不淨水不得當路當低低潑下不得高手揚潑濺人衣上不得熱湯潑地內衣宜頻浣有蟣虱宜先拾去髮宜多櫛積髮多乃焚僻靜處不得納房內壁縫法堂中神像前不得盥漱剌齒唾涕當在僻靜處亦不得對北唾涕有瘡癬當避人不得盥手共器有可畏瘡疣不得剌人目飮食威儀凡齋會先致敬供奉聖真大衆端莊齊立誦靈書中篇畢末座出生於衆生盤內誦偈云汝等鬼神衆我今施汝供此食遍十方一切鬼神共唵吽靈娑訶三遍出生飯不過七粒麵不過一寸饅首不過指甲許餘飮食蔬菜不出生食時微咒曰五星之氣六甲之精三真天倉清雲常盈黃父赤子守中無傾飮食微咒曰神水入腹五臟清明飮食時不得笑語不得舍食語不得呵食好惡不得搔首不得剌齒欲剌齒以袖掩口不得嚙食有聲不得作口容不得咱舌有聲不得不遜恣食不得已厯己口復反盤內飯中有穀當去皮食之不得棄地飮食中有蠱蟻宜密去之不得令衆知食竟不得更離座食放碗箸不得有聲不得偏衆食不得見美味生貪心恣食凡同衆食不得太遲不得太速舉箸放箸不在師長前行食未至不得生煩惱不得大聲呼喚時常飮食不得失儀有失儀者不得非笑飮食畢擊磬聽大衆經行聽法威儀凡聽法已精思理致身體力行不得徒資口耳年少初真戒行未堅道心未篤宜專持本戒不得蚤受中極戒不得與年少道士俗姓子弟結友不得與女冠結拜姊妹書疏往來出行威儀入法堂行安詳舒徐人閲經不得在彼案前經行人禮拜不得在彼頭前經行入觀宇不得行中央當路或左或右行隨師行當低頭隨後不得左右顧盼不得止道傍久共人語不得馳行不得掉臂行不得與少年道俗談笑同行不得在女人前後互隨行不得與醉漢狂夫前後互隨行隨師行若偶分行期會處不得後時凡遇官府不論大小宜回避年少戒行未堅不得遠方逰行必欲參師訪道當擇賢侣不得同不肖匪人同行起立威儀立不得偏任一足及倚棹靠壁侍師不得對面立不得高處立不得遠立立師後不得倚師座見師長起立見賓客起立除誦經時作務時病時侍師師命坐方坐師有問當起儒禮云君子問更端則起而對坐卧威儀看閲經典不得箕踞當焚香正襟危坐不得當聖像坐坐功依師傳受按時靜坐不得失次對師長不得坐功對賓客不得坐功夜中宜多坐少卧不得同婦人坐不得與女冠同坐如女冠來問道開示畢即遣歸不得久留坐靜坐約一時或經行或卧與人並坐不得橫肱坐不得堅膝坐交臂膝上卧宜側禮屈足醒則舒不得偃仰卧不得與師同房卧或同房不得同榻卧師未卧不得先卧已卧不得言語不得脫小衣卧不得於非處卧臨卧携火入房須與同房者知云火入欲熄火亦與知云更用燈否大暑不得伏地卧不得露卧不得晝卧不得飽食便卧不得置火枕邊不得携穢器從法堂前過晨起先左足下牀臨卧時咒曰太真玉女侍真衛𩲉三宫金童來守生門卧醒時咒曰當願衆生以迷入覺一旦豁然下牀時咒曰化惡反善上書三光使我長生乘景駕雲作務威儀凡作務不得辭勞苦平日當愛惜常住物不得狼籍米穀粉麵等凡洗菜當三易水凡汲水當先澡手凡汲水當諦視有蟲無蟲絹濾過方用嚴冬不得蚤瀘水須待日出爨不得燃腐薪凡作食當三澡手不得帶爪甲垢掃地當先灑水每方五尺作一次掃不得揚塵不得逆風掃不得聚灰土於門扇後沐浴威儀浴宜朔日不得當風不得帶濕縈髻不得抿髮不避人前沐不得數不得與俗並日入浴堂脫衣著衣當安詳自在入浴先洗僻處不得浴堂小遺不得粗躁致湯水濺鄰人入浴不得共人語不得恣意久浴妨礙後人有瘡癬當後浴不得先入湯冷熱依例擊梆不得高聲大喚沐浴宜五香湯白芷桃皮柏皮零陵青木香也沐浴未乾不得趺坐及卧沐浴微咒曰天地開朗四大為常玄水解穢辟除不祥雙童守護七靈安房雲津練濯萬氣混康內外利貞保茲黃裳書云不矜細行終纍大德約而言之事事不過一敬推而廣之洋洋奚止三千現前衆等若能隨事體察觸類旁通始或勉強終歸自然也勇猛力行無怠無忽不惟具大福報決定仙都紀名復有護戒神王營護戒體證無上道弟子奉師科戒三十九條弟子別師經月皆冠帶執簡稽首不得白服弟子別師經宿皆禮拜長跪遠亦如之弟子不得向師稱你我之稱弟子詣師不得專輒而坐命坐方坐弟子不得喚師作道士皆云家師弟子不得犯師名諱若人問不止上下聲答之弟子不得唐突左右皆有司察之神官弟子見師有過失當於深處長跪諫之不得在人前言師是非醜鄙弟子與師言不得高聲大語弟子與師共室不得先卧在後起弟子與師同食不得在師前食弟子稽首師皆當隨其所受高下巾褐執簡不得趣爾白服弟子隨師起居行止皆當謙卑恭敬不得斯須無敬譬如官長二千石父母同等不得自恃高貴輕忽於師其罪不小具在明真科弟子與師同在席坐師若起動行止弟子即須倚立不得安然端坐弟子先未受法戒或氣類齊等或復耆年或同姓從兄弟子孫後詣師受法皆須謙卑恭敬言皆稱名不得比常弟子與師親服緦麻者皆不得相為師所以爾者受法皆證三曾七祖父母來監臨子孫所受違盟九祖受考殃及受法之身弟子不得忿嫉責怒師主及懷恨在心罪科具出明真經弟子詣師請道法皆當冠帶執簡謙苦求請不得趣爾弟子與師別經年月朔皆冠帶執簡禮三拜長跪稽首訖復再拜合成五拜別亦如之明各誠焉弟子不得與師爭口忽忽哂意弟子事師皆當恭敬不得傲慢無禮罰在明真經中宜各愼之弟子不得與師爭競功名無有推讓之心弟子詣師當請問所受不得論及私鄙弟子事師師若遠行還弟子皆當隨路遠近奉迎不得端坐晏然待師至弟子與師同行不得踐師影愼之弟子與師共在座不得受人拜跪所以爾者座無二尊弟子不得陰行橫勃忿鬬師主弟子若出入及所營作每先咨問於師不得自專弟子事師皆當恩愛信實不得猶豫二心弟子不得竊盜發泄師器笈中犯師禁戒科律得罪弟子不得背叛師主愼之具在明真經文弟子與師同處不得涕唾地愼之弟子侍從師若值賓客弟子侍衛師左右不得高抗大坐與凡人無別皆大不孝愼之弟子受師法業後玄德成就為人所宗皆當謙下存憶本師勿忘先恩也弟子事師不得輒坐師床席處所神司之禁也戒衣四十六條第一不冠戒衣不得登壇入靜禮願啓請悔過求恩第二不冠戒服不得逼近經戒講説念誦看讀敷揚第三不冠戒服不得持奉齋戒受人禮拜飮食供養第四不冠戒服不得禮拜師尊長德及受弟子禮拜第五不冠戒服不得出入所居人間遊行見諸凡人第六不冠戒服不得祝禁符劾章奏表啓第七不冠戒服不得覲見國主父母及諸世民第八寢息休暇當脫戒服第九沐浴洗濯當脫戒服第十大小便時當脫戒服第十一泥雨濁穢當脫戒服第十二供養給使師尊父母當脫戒服第十三檢校修造一切功德勿脫戒服第十四檢校營造齋供花果勿脫戒服第十五檢校種植勿脫戒服第十六非枷獄病苦勿脫戒服第十七手足不淨勿犯戒服第十八器物不淨勿犯戒服第十九床席不淨勿犯戒服第二十車輿不淨勿犯戒服第二十一裸露身形勿犯戒服第二十二鳥獸蟲魚勿犯戒服第二十三口氣臭穢勿犯戒服第二十四非同學弟子勿犯戒服第二十五始欲出家先備戒服第二十六欲受經戒須備戒服第二十七詣師請經道戒須上戒服第二十八詣師請福解免厄苦須上戒服第二十九戒服非律主不得用五綵作第三十戒服不得以拜義物作第三十一戒服非律主不得用錦繡作第三十二戒服不得不依戒作第三十三戒服不得假借他人第三十四戒服不得隨宜拋擲第三十五戒服不得安卧床上第三十六戒服不得坐卧其上第三十七戒服不得以腳踏洗及槌拍第三十八戒服破壞當須火淨第三十九戒服不得過三件餘便施人第四十戒服破壞及餘物不得充非用并非人著第四十一戒服作成燒香啓告禮拜三寶先獻三寶及諸仙真聖然後方取著第四十二戒服近經像者不得著人間及不淨處者第四十三戒服須勤洗濯燒香清淨箱簏藏舉勿使污穢常置淨室第四十四不得著戒服遊五種家第四十五不得擅脫戒服濳遊人間第四十六坐起卧息常依戒律愼之愼之女真九戒附一曰孝敬柔和愼言不妒二曰貞潔持身離諸穢行三曰惜諸物命慈愍不殺四曰禮誦勤愼斷絶葷酒五曰衣具質素不事華飾六曰調適性情不生煩惱七曰不得數赴齋會八曰不得虐使奴僕九曰不得竊取人物以上女真九戒若道姑若信女而能行持不退有大利益不經地獄之苦必生十善之家再能精進修持圓成戒果名登紫府位列仙班矣崑陽律師付囑偈其一整衣太上流傳一戒衣冠簪巾履立威儀坐宜平正行宜緩身要端莊眼要低托鉢化齋防滑石展規朝禮莫拖泥燈前燭下休鋪疊壁上釘頭必遠離其二護鉢鉢乃全真大法王囊為梵氣謹包藏隨身走路須防跌過宿安單莫挂墻便是同衣休亂借齋完洗滌莫慌忙如同護命時時記謹愼修持道自昌其三惜鞋芒鞋須不比尋常謁聖朝真上法堂或用布包收直袋莫連泥土入衣囊出恭告淨先宜換走路行程另一雙污泥地下休亂去忌縫皮底造愆殃其四藏牒戒經戒牒謹藏身不比尋常別樣文性命所關心要細神仙有分念須真塵垢案頭休展放輕狂侣伴莫談論布縫小袋時時佩妙行精嚴動鬼神其五參訪敬謁當家即下參知賓借會借安單粉墻板壁休題句淨地雲堂勿吐痰隨衆上堂勤課誦逢人應對謹言談平心定氣聲和緩踵息深深莫放參其六行持戒是全真第一關受之容易守之難對人最要言談少打坐常教意念安托鉢化齋消歲月雲蹤鶴迹覺淸間降心堅固行持久性定神凝自返還初真戒後序戒律之義備於道藏久矣自北七真出龍門一派崇尚淸靜專守戒規所以為初學之子澄心遣欲者法誠善竊慨道風中弛規條蕩佚方外之士咸以飄笠逍遙不加檢束崑陽王先生崛起身任其事海內黃冠始知有淸都玉律矣先生攝靜於金陵之隱仙庵受四方迎請為闡揚斯義僕棲拙鬱岡時得侍先生几杖蒙教言不棄與先生諸弟子遊每述先生內養之道精通祖訣只以傳戒設教故祕而不談誠有見於學仙之事非塵界不德之子所易希冀惟恪奉戒規磋磨凡骨此即築基鍊己之要道也先生不久即欲歸隱名山以遂還返初志憫學者歧路而弗忍遽棄人間也故有諸名山傳戒之遊凡受戒者毋徒以巾裾儼然不悟性命微旨以負先生之慈寶也哉鬱岡居士笡重光拜撰
